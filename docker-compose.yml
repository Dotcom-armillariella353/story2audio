services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: story2audio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"
    expose:
      - "8000"
    volumes:
      - story2audio_cache:/app/audio_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  story2audio_cache:
