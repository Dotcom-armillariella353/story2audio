<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story to Audio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 860px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f0f4f8;
            color: #2d3748;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 24px; }
        textarea {
            width: 100%;
            height: 220px;
            padding: 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            background: #fff;
        }
        .controls {
            margin: 18px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            justify-content: center;
        }
        .ctrl-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .ctrl-group label {
            font-size: 0.78em;
            font-weight: 600;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 2px rgba(49,130,206,0.2);
        }
        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            background: #3182ce;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            align-self: flex-end;
        }
        button:hover { background: #2b6cb0; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        .card {
            display: none;
            background: #fff;
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            margin: 16px 0;
        }
        .status-text { font-weight: 600; color: #2d3748; margin-bottom: 8px; }
        .progress-bar {
            width: 100%;
            background: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: 8px 0;
        }
        .progress-fill {
            width: 0%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            height: 100%;
            border-radius: 5px;
            transition: width 0.4s ease;
        }
        #progText { text-align: right; color: #718096; font-size: 0.82em; margin-top: 4px; }
        #playerContainer h3 { margin: 0 0 12px; color: #2c3e50; }
        audio { width: 100%; }
        .info { color: #718096; font-size: 0.9em; margin-top: 10px; }
        .download-btn {
            display: none;
            margin-top: 14px;
            padding: 10px 22px;
            background: linear-gradient(135deg, #38a169, #276749);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            align-items: center;
            gap: 8px;
        }
        .download-btn:hover {
            background: linear-gradient(135deg, #276749, #1c4532);
            transform: translateY(-1px);
        }
        .download-btn:active { transform: translateY(0); }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }
        .badge-live { background: #fed7d7; color: #c53030; }
        .badge-done { background: #c6f6d5; color: #276749; }
        .badge-cached { background: #bee3f8; color: #2b6cb0; }
        .badge-error { background: #feebc8; color: #c05621; }
        .badge-wait { background: #faf089; color: #975a16; }

        /* Language switcher flags */
        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .lang-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: 2px solid #cbd5e0;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: #4a5568;
        }
        .lang-btn:hover { border-color: #3182ce; color: #3182ce; }
        .lang-btn.active {
            background: #3182ce;
            border-color: #3182ce;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1 id="pageTitle">Story to Audio <span style="font-size: 0.4em; color: #718096; vertical-align: middle; font-weight: normal;">{{VERSION}}</span></h1>

    <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn active" data-lang="vi" aria-label="🇻🇳 Tiếng Việt">🇻🇳 Tiếng Việt</button>
        <button class="lang-btn" data-lang="en" aria-label="🇺🇸 English">🇺🇸 English</button>
        <button class="lang-btn" data-lang="ja" aria-label="🇯🇵 日本語">🇯🇵 日本語</button>
        <button class="lang-btn" data-lang="zh" aria-label="🇨🇳 中文">🇨🇳 中文</button>
        <button class="lang-btn" data-lang="ko" aria-label="🇰🇷 한국어">🇰🇷 한국어</button>
        <button class="lang-btn" data-lang="fr" aria-label="🇫🇷 Français">🇫🇷 Français</button>
        <button class="lang-btn" data-lang="de" aria-label="🇩🇪 Deutsch">🇩🇪 Deutsch</button>
    </div>

    <textarea id="textInput" placeholder="..."></textarea>

    <div class="controls">
        <div class="ctrl-group">
            <label for="engine" id="labelEngine">Engine</label>
            <select id="engine">
                <option value="edge" id="optEdge">Edge-TTS</option>
                <option value="gtts" id="optGtts">Google TTS</option>
            </select>
        </div>

        <div class="ctrl-group" id="voiceGroup">
            <label for="voice" id="labelVoice">Voice</label>
            <select id="voice"></select>
        </div>

        <div class="ctrl-group">
            <label for="speedSelect" id="labelSpeed">Speed</label>
            <select id="speedSelect">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>

        <button id="convertBtn">▶ Convert</button>
    </div>

    <div class="card" id="progContainer">
        <div class="status-text" id="statusLabel">...</div>
        <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        <p id="progText">0 / 0</p>
    </div>

    <div class="card" id="playerContainer">
        <h3 id="playerTitle">Audio Player</h3>
        <audio id="audioPlayer" controls preload="metadata"></audio>
        <p class="info" id="fileSizeInfo"></p>
        <a id="downloadBtn" class="download-btn" download="audio.mp3">
            ⬇ Download MP3
        </a>
    </div>

    <script>
        // ============================================================
        // i18n State
        // ============================================================
        let currentLang = 'vi';
        let t = {};          // current translations
        let _injectedLang = null; // set by server when a locale is pre-loaded
        const _localeCache = {}; // in-memory cache: langCode -> translations object
        let voiceRegistry = {}; // { langCode: [{value, label}] }
        /* __VOICE_REGISTRY_PLACEHOLDER__ */
        /* __LOCALE_VI_PLACEHOLDER__ */
        // Seed cache from server-injected locale so it is available after language switches
        if (_injectedLang) _localeCache[_injectedLang] = t;

        // Language display names for labels
        const LANG_NAMES = {
            vi: '🇻🇳 Tiếng Việt',
            en: '🇺🇸 English',
            ja: '🇯🇵 日本語',
            zh: '🇨🇳 中文',
            ko: '🇰🇷 한국어',
            fr: '🇫🇷 Français',
            de: '🇩🇪 Deutsch',
        };

        async function loadLocale(lang) {
            // 1. Return from in-memory cache (includes server-injected locale)
            if (_localeCache[lang]) return _localeCache[lang];

            // 2. Fetch from server; try requested lang then fallback to 'en', 'vi'
            const candidates = [lang, 'en', 'vi'].filter((l, i, a) => a.indexOf(l) === i);
            for (const candidate of candidates) {
                try {
                    const res = await fetch(`/static/locales/${candidate}.json`);
                    if (res.ok) {
                        const data = await res.json();
                        _localeCache[candidate] = data;
                        return data;
                    }
                } catch (_) {}
            }
            throw new Error('Failed to load any locale (tried: ' + candidates.join(', ') + ')');
        }

        async function loadVoiceRegistry() {
            // Skip API call if voice data was already injected by the server at page load
            if (Object.keys(voiceRegistry).length > 0) return;

            const res = await fetch('/tts/voices', { cache: 'no-store' });
            if (!res.ok) throw new Error('Voices API failed');
            const data = await res.json();
            if (data && typeof data.voices === 'object' && !Array.isArray(data.voices)) {
                voiceRegistry = data.voices;
            } else {
                console.warn('[TTS] Unexpected voices payload, defaulting to empty registry', data);
                voiceRegistry = {};
            }
        }

        function applyLocale() {
            document.documentElement.lang = currentLang;
            document.title = t.title || 'Story to Audio';
            document.getElementById('pageTitle').textContent = t.title || 'Story to Audio';
            document.getElementById('textInput').placeholder = t.placeholder || '';

            document.getElementById('labelEngine').textContent = t.label_engine || 'Engine';
            document.getElementById('labelVoice').textContent  = t.label_voice  || 'Voice';
            document.getElementById('labelSpeed').textContent  = t.label_speed  || 'Speed';
            document.getElementById('optEdge').textContent = t.engine_edge || 'Edge-TTS';
            document.getElementById('optGtts').textContent = t.engine_gtts || 'Google TTS';
            
            // Ensure button text keeps the original state if disabled
            const btn = document.getElementById('convertBtn');
            btn.textContent = t.btn_convert || '▶ Convert';
            
            // The audio player title shouldn't override the injected span badge if it exists.
            const badge = document.getElementById('playerTitle').querySelector('.badge');
            document.getElementById('playerTitle').textContent = t.player_title || 'Audio Player';
            if (badge) {
                document.getElementById('playerTitle').appendChild(badge);
            }
            
            document.getElementById('downloadBtn').textContent = t.download || '⬇ Download MP3';

            // Force dynamic texts to translate
            renderStatus();
            renderFileSize();
            renderBadge();
            
            if (lastStatus && lastStatus.total !== undefined) {
                updateProgress(lastStatus.progress || 0, lastStatus.total);
            } else {
                document.getElementById('progText').textContent = '0 / 0 ' + (t.segments || '');
            }
        }

        function updateVoiceDropdown() {
            const voices = voiceRegistry[currentLang] || [];
            const sel = document.getElementById('voice');
            sel.innerHTML = '';
            voices.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.value;
                opt.textContent = v.label;
                sel.appendChild(opt);
            });
            // Show/hide voice group based on engine AND availability
            updateVoiceVisibility();
        }

        async function switchLanguage(lang) {
            currentLang = lang;
            // Update active button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            // Load translations
            t = await loadLocale(lang);
            applyLocale();
            // Set sample text on language switch
            document.getElementById('textInput').value = t.sample_text || '';
            // Update voice dropdown for this language
            updateVoiceDropdown();
        }

        // ============================================================
        // Playback State
        // ============================================================
        let pollingInterval = null;
        let currentCacheId = null;
        let currentMode = null;

        let mediaSource = null;
        let sourceBuffer = null;
        let streamReader = null;
        let bytesReceived = 0;
        let streamFinished = false;
        let lastStatus = null;

        const player      = document.getElementById('audioPlayer');
        const btn         = document.getElementById('convertBtn');
        const progFill    = document.getElementById('progFill');
        const progText    = document.getElementById('progText');
        const statusLbl   = document.getElementById('statusLabel');
        const fileSizeInfo= document.getElementById('fileSizeInfo');
        const playerTitle = document.getElementById('playerTitle');
        const playerBox   = document.getElementById('playerContainer');
        const progBox     = document.getElementById('progContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const speedSelect = document.getElementById('speedSelect');
        const engineSel   = document.getElementById('engine');
        const voiceGroup  = document.getElementById('voiceGroup');
        const voiceSel    = document.getElementById('voice');

        const MSE_SUPPORTED = (
            typeof MediaSource !== 'undefined' &&
            MediaSource.isTypeSupported('audio/mpeg')
        );
        console.log('[TTS] MediaSource audio/mpeg supported:', MSE_SUPPORTED);

        // ============================================================
        // Helpers
        // ============================================================
        function getRate() {
            return parseFloat(speedSelect.value || '1');
        }

        function formatBytes(bytes) {
            if (!bytes || bytes < 0) return '0 KB';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function updateVoiceVisibility() {
            const isGtts = engineSel.value === 'gtts';
            const hasVoices = (voiceRegistry[currentLang] || []).length > 0;
            voiceGroup.style.display = (isGtts || !hasVoices) ? 'none' : '';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function renderStatus() {
            if (!lastStatus) {
                setStatus(t.status_init || '...');
                return;
            }
            const data = lastStatus;
            
            // Special states managed early in loop
            if (currentMode === 'cached') {
                setStatus(t.status_cached || 'Found in cache.');
                return;
            }
            
            if (data.status === 'processing' || data.status === 'queued') {
                const tpl = currentMode === 'mse'
                    ? (t.status_processing_live || 'Generating {p}/{t} live...')
                    : (t.status_processing     || 'Generating {p}/{t}...');
                setStatus(tpl
                    .replace('{p}', data.progress || 0)
                    .replace('{t}', data.total    || 0));
            } else if (data.status === 'failed') {
                setStatus((t.status_failed || 'Failed: ') + (data.error || 'unknown'));
            } else if (data.status === 'completed') {
                const finalSize = data.file_size || 0;
                if (currentMode === 'mse') {
                    if (streamFinished && bytesReceived >= finalSize) {
                        setStatus(t.status_done || 'Done!');
                    } else {
                        setStatus(t.status_stream_done_loading || 'Loading final part...');
                    }
                } else {
                    setStatus(t.status_done || 'Done!');
                }
            }
        }

        function renderFileSize() {
            if (!fileSizeInfo) return;
            const finalSize = (lastStatus && lastStatus.file_size) ? lastStatus.file_size : 0;
            
            if (lastStatus && lastStatus.status === 'completed' && (!currentMode || currentMode !== 'mse' || (streamFinished && bytesReceived >= finalSize))) {
                if (finalSize > 0) {
                    fileSizeInfo.textContent = (t.filesize || 'File size: ') + formatBytes(finalSize);
                } else if (bytesReceived > 0) {
                    fileSizeInfo.textContent = (t.filesize || 'File size: ') + formatBytes(bytesReceived);
                }
                return;
            }

            if (finalSize > 0 && bytesReceived > 0 && bytesReceived < finalSize) {
                fileSizeInfo.textContent = (t.received || 'Received: ') + formatBytes(bytesReceived) + ' / ' + formatBytes(finalSize);
                return;
            }

            if (bytesReceived > 0) {
                fileSizeInfo.textContent = (t.received || 'Received: ') + formatBytes(bytesReceived);
                return;
            }

            if (!bytesReceived && !finalSize) {
                fileSizeInfo.textContent = '';
            }
        }

        function renderBadge() {
            const badge = playerTitle.querySelector('.badge');
            if (!badge) return;
            const classes = Array.from(badge.classList);
            let type = null;
            if (classes.includes('badge-live')) type = 'live';
            else if (classes.includes('badge-done')) type = 'done';
            else if (classes.includes('badge-cached')) type = 'cached';
            else if (classes.includes('badge-error')) type = 'error';
            else if (classes.includes('badge-wait')) type = 'wait';
            
            if (type) {
                badge.textContent = {
                    live:   '● LIVE',
                    done:   t.badge_done   || '✓ Done',
                    cached: t.badge_cached || '★ Cached',
                    error:  t.badge_error  || '⚠ Error',
                    wait:   t.badge_wait   || '… Waiting',
                }[type] || type;
            }
        }

        function updateProgress(current, total) {
            const pct = total > 0 ? (current / total) * 100 : 0;
            progFill.style.width = pct + '%';
            progText.textContent = `${current || 0} / ${total || 0} ${t.segments || ''}`;
        }

        function setStatus(text) {
            statusLbl.textContent = text;
        }

        function showBadge(type) {
            const old = playerTitle.querySelector('.badge');
            if (old) old.remove();
            const badge = document.createElement('span');
            badge.className = 'badge badge-' + type;
            badge.textContent = {
                live:   '● LIVE',
                done:   t.badge_done   || '✓ Done',
                cached: t.badge_cached || '★ Cached',
                error:  t.badge_error  || '⚠ Error',
                wait:   t.badge_wait   || '… Waiting',
            }[type] || type;
            playerTitle.appendChild(badge);
        }

        function clearBadge() {
            const old = playerTitle.querySelector('.badge');
            if (old) old.remove();
        }

        function applyPlaybackRate() {
            player.playbackRate = getRate();
        }

        function cleanupMSE() {
            if (streamReader) {
                try { streamReader.cancel(); } catch (_) {}
                streamReader = null;
            }
            if (mediaSource && mediaSource.readyState === 'open') {
                try { mediaSource.endOfStream(); } catch (_) {}
            }
            if (player.src && player.src.startsWith('blob:')) {
                try { URL.revokeObjectURL(player.src); } catch (_) {}
            }
            mediaSource = null;
            sourceBuffer = null;
        }

        function resetUI() {
            cleanupMSE();
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
            currentCacheId = null;
            currentMode = null;
            bytesReceived = 0;
            streamFinished = false;
            lastStatus = null;

            player.pause();
            player.removeAttribute('src');
            player.load();

            progBox.style.display = 'block';
            playerBox.style.display = 'none';
            progFill.style.width = '0%';
            progText.textContent = '0 / 0 ' + (t.segments || '');
            fileSizeInfo.textContent = '';
            downloadBtn.style.display = 'none';
            downloadBtn.href = '';
            setStatus(t.status_sending || 'Sending...');
            clearBadge();
        }

        function waitSourceBufferIdle(sb) {
            if (!sb || !sb.updating) return Promise.resolve();
            return new Promise(resolve => {
                sb.addEventListener('updateend', resolve, { once: true });
            });
        }

        async function appendChunkToSourceBuffer(sb, chunk) {
            await waitSourceBufferIdle(sb);
            return new Promise((resolve, reject) => {
                const onUpdateEnd = () => { cleanup(); resolve(); };
                const onError = (e) => { cleanup(); reject(e); };
                const cleanup = () => {
                    sb.removeEventListener('updateend', onUpdateEnd);
                    sb.removeEventListener('error', onError);
                };
                sb.addEventListener('updateend', onUpdateEnd, { once: true });
                sb.addEventListener('error', onError, { once: true });
                try {
                    sb.appendBuffer(chunk);
                } catch (e) {
                    cleanup();
                    reject(e);
                }
            });
        }

        // ============================================================
        // Core flow
        // ============================================================
        engineSel.addEventListener('change', updateVoiceVisibility);

        speedSelect.addEventListener('change', applyPlaybackRate);
        player.addEventListener('play', applyPlaybackRate);
        player.addEventListener('canplay', applyPlaybackRate);

        btn.onclick = async function () {
            const text   = document.getElementById('textInput').value.trim();
            const engine = engineSel.value;
            const voice  = voiceSel.value;

            if (!text) {
                alert(t.alert_empty || 'Please enter text!');
                return;
            }

            resetUI();
            btn.disabled = true;

            const body = { text, engine, language: currentLang };
            if (engine === 'edge') body.voice = voice;

            let data;
            try {
                const res = await fetch('/tts/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || (t.status_failed || 'Failed'));
                }
            } catch (e) {
                setStatus((t.err_connect || 'Error: ') + (e.message || e));
                showBadge('error');
                btn.disabled = false;
                return;
            }

            currentCacheId = data.cache_id;

            if (data.status === 'completed') {
                currentMode = 'cached';
                updateProgress(1, 1);
                setStatus(t.status_cached || 'Found in cache.');
                showBadge('cached');
                playDirect(currentCacheId);
                showDownloadButton(currentCacheId);
                btn.disabled = false;
                return;
            }

            if (MSE_SUPPORTED) {
                currentMode = 'mse';
                showBadge('live');
                setStatus(t.status_generating_live || 'Generating and streaming...');
                startPolling(currentCacheId, { allowDirectPlayWhenCompleted: false });
                startMSEPlayback(currentCacheId);
            } else {
                currentMode = 'fallback';
                showBadge('wait');
                setStatus(t.status_no_mse || 'Generating, will play when done...');
                startPolling(currentCacheId, { allowDirectPlayWhenCompleted: true });
            }
        };

        // ============================================================
        // Polling status
        // ============================================================
        function startPolling(cacheId, options = {}) {
            const { allowDirectPlayWhenCompleted = false } = options;
            if (pollingInterval) clearInterval(pollingInterval);

            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch('/tts/status/' + cacheId, { cache: 'no-store' });
                    if (!res.ok) throw new Error(t.err_status || 'Could not fetch status');
                    const data = await res.json();
                    lastStatus = data;

                    updateProgress(data.progress || 0, data.total || 0);

                    if (data.status === 'processing') {
                        renderStatus();
                        renderFileSize();
                        return;
                    }

                    if (data.status === 'failed') {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                        setStatus((t.status_failed || 'Failed: ') + (data.error || 'unknown'));
                        showBadge('error');
                        btn.disabled = false;
                        return;
                    }

                    if (data.status === 'completed') {
                        const finalSize = data.file_size || 0;
                        updateProgress(data.total || 1, data.total || 1);

                        if (currentMode === 'mse') {
                            if (streamFinished && bytesReceived >= finalSize) {
                                showBadge('done');
                                showDownloadButton(cacheId);
                                clearInterval(pollingInterval);
                                pollingInterval = null;
                                btn.disabled = false;
                            } else {
                                showBadge('live');
                            }
                        } else {
                            showBadge('done');
                            showDownloadButton(cacheId);
                            clearInterval(pollingInterval);
                            pollingInterval = null;
                            if (allowDirectPlayWhenCompleted) {
                                playDirect(cacheId);
                            }
                            btn.disabled = false;
                        }
                        renderStatus();
                        renderFileSize();
                    }
                } catch (e) {
                    console.error('Polling error:', e);
                }
            }, 1000);
        }

        // ============================================================
        // MediaSource live playback
        // ============================================================
        function startMSEPlayback(cacheId) {
            playerBox.style.display = 'block';
            bytesReceived = 0;
            streamFinished = false;

            mediaSource = new MediaSource();
            player.src = URL.createObjectURL(mediaSource);

            mediaSource.addEventListener('sourceopen', async () => {
                try {
                    if (!mediaSource || mediaSource.readyState !== 'open') return;
                    sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
                    sourceBuffer.mode = 'sequence';
                    await pumpLiveStream(cacheId);
                } catch (e) {
                    console.error('[MSE] sourceopen error:', e);
                    setStatus(t.status_stream_error || 'Cannot stream live. Waiting...');
                    showBadge('wait');
                    cleanupMSE();
                    currentMode = 'fallback';
                    startPolling(cacheId, { allowDirectPlayWhenCompleted: true });
                }
            }, { once: true });
        }

        async function pumpLiveStream(cacheId) {
            let response = null;

            for (let attempt = 0; attempt < 40; attempt++) {
                try {
                    const res = await fetch('/tts/stream/' + cacheId, { cache: 'no-store' });
                    if (res.ok) { response = res; break; }
                    if (res.status === 503) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.detail || 'Generation failed');
                    }
                } catch (e) {
                    if (attempt === 39) throw e;
                }
                await sleep(300);
            }

            if (!response || !response.body) {
                throw new Error(t.err_no_stream || 'Cannot open live stream');
            }

            streamReader = response.body.getReader();
            let firstChunk = true;

            while (true) {
                const { done, value } = await streamReader.read();
                if (done) break;
                if (!value || value.byteLength === 0) continue;

                bytesReceived += value.byteLength;
                renderFileSize();

                if (!sourceBuffer || !mediaSource || mediaSource.readyState !== 'open') break;

                await appendChunkToSourceBuffer(sourceBuffer, value);

                if (firstChunk) {
                    firstChunk = false;
                    playerBox.style.display = 'block';
                    applyPlaybackRate();
                    player.play().catch(() => {});
                }
            }

            streamFinished = true;

            if (sourceBuffer) await waitSourceBufferIdle(sourceBuffer);
            if (mediaSource && mediaSource.readyState === 'open') {
                try { mediaSource.endOfStream(); } catch (_) {}
            }

            const finalState = lastStatus;
            if (finalState && finalState.status === 'completed') {
                const finalSize = finalState.file_size || 0;
                if (bytesReceived >= finalSize) {
                    showBadge('done');
                    showDownloadButton(cacheId);
                    if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
                } else {
                    showBadge('live');
                }
                renderStatus();
                renderFileSize();
            }

            btn.disabled = false;
        }

        // ============================================================
        // Download button
        // ============================================================
        function showDownloadButton(cacheId) {
            const url = '/tts/file/' + cacheId;
            downloadBtn.href = url;
            downloadBtn.download = 'audio_' + cacheId.slice(0, 8) + '.mp3';
            downloadBtn.style.display = 'inline-flex';
        }

        // ============================================================
        // Direct playback for cached/completed audio
        // ============================================================
        function playDirect(cacheId) {
            playerBox.style.display = 'block';
            const url = '/tts/file/' + cacheId + '?t=' + Date.now();
            player.src = url;
            player.addEventListener('canplay', function onCanPlay() {
                player.removeEventListener('canplay', onCanPlay);
                applyPlaybackRate();
                player.play().catch(() => {});
            }, { once: true });
        }

        // ============================================================
        // Language switcher wiring
        // ============================================================
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => switchLanguage(btn.dataset.lang));
        });

        // ============================================================
        // Bootstrap
        // ============================================================
        (async () => {
            try {
                await loadVoiceRegistry();
                await switchLanguage('vi');
            } catch (err) {
                console.error('[TTS] Initialization failed:', err);
                const statusEl = document.getElementById('statusLabel');
                if (statusEl) {
                    statusEl.textContent = 'Initialization failed. Please reload the page.';
                    statusEl.style.color = '#e53e3e';
                }
            }
        })();
    </script>
</body>
</html>
