<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuyển đổi Truyện thành Audio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 860px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f0f4f8;
            color: #2d3748;
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 24px; }
        textarea {
            width: 100%;
            height: 220px;
            padding: 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            background: #fff;
        }
        .controls {
            margin: 18px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            justify-content: center;
        }
        .ctrl-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .ctrl-group label {
            font-size: 0.78em;
            font-weight: 600;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 2px rgba(49,130,206,0.2);
        }
        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            background: #3182ce;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            align-self: flex-end;
        }
        button:hover { background: #2b6cb0; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        .card {
            display: none;
            background: #fff;
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            margin: 16px 0;
        }
        .status-text { font-weight: 600; color: #2d3748; margin-bottom: 8px; }
        .progress-bar {
            width: 100%;
            background: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: 8px 0;
        }
        .progress-fill {
            width: 0%;
            background: linear-gradient(90deg, #48bb78, #38a169);
            height: 100%;
            border-radius: 5px;
            transition: width 0.4s ease;
        }
        #progText { text-align: right; color: #718096; font-size: 0.82em; margin-top: 4px; }
        #playerContainer h3 { margin: 0 0 12px; color: #2c3e50; }
        audio { width: 100%; }
        .info { color: #718096; font-size: 0.9em; margin-top: 10px; }
        .download-btn {
            display: none;
            margin-top: 14px;
            padding: 10px 22px;
            background: linear-gradient(135deg, #38a169, #276749);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            align-items: center;
            gap: 8px;
        }
        .download-btn:hover {
            background: linear-gradient(135deg, #276749, #1c4532);
            transform: translateY(-1px);
        }
        .download-btn:active { transform: translateY(0); }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }
        .badge-live { background: #fed7d7; color: #c53030; }
        .badge-done { background: #c6f6d5; color: #276749; }
        .badge-cached { background: #bee3f8; color: #2b6cb0; }
        .badge-error { background: #feebc8; color: #c05621; }
        .badge-wait { background: #faf089; color: #975a16; }
    </style>
</head>
<body>
    <h1>Chuyển đổi Truyện thành Audio</h1>

    <textarea id="textInput" placeholder="Nhập nội dung truyện tại đây...">Trong một ngôi làng nọ, có một cậu bé rất thông minh. Cậu thường xuyên giúp đỡ mọi người và được dân làng yêu quý. Một ngày, có một người khách lạ đến làng và đặt ra một câu đố khó. Cậu bé đã suy nghĩ rất lâu và cuối cùng đưa ra được câu trả lời chính xác. Dân làng vô cùng ngưỡng mộ và tự hào về cậu.</textarea>

    <div class="controls">
        <div class="ctrl-group">
            <label for="engine">Công cụ</label>
            <select id="engine">
                <option value="edge">Edge-TTS (Chất lượng cao)</option>
                <option value="gtts">Google TTS</option>
            </select>
        </div>

        <div class="ctrl-group" id="voiceGroup">
            <label for="voice">Giọng đọc</label>
            <select id="voice">
                <option value="vi-VN-HoaiMyNeural">Hoài Mỹ (Nữ)</option>
                <option value="vi-VN-NamMinhNeural">Nam Minh (Nam)</option>
            </select>
        </div>

        <div class="ctrl-group">
            <label for="speedSelect">Tốc độ</label>
            <select id="speedSelect">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>

        <button id="convertBtn">▶ Chuyển sang Audio</button>
    </div>

    <div class="card" id="progContainer">
        <div class="status-text" id="statusLabel">Đang khởi tạo...</div>
        <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        <p id="progText">0 / 0 đoạn</p>
    </div>

    <div class="card" id="playerContainer">
        <h3 id="playerTitle">Trình phát Audio</h3>
        <audio id="audioPlayer" controls preload="metadata"></audio>
        <p class="info" id="fileSizeInfo"></p>
        <a id="downloadBtn" class="download-btn" download="audio.mp3">
            ⬇ Tải xuống MP3
        </a>
    </div>

    <script>
        // ============================================================
        // State
        // ============================================================
        let pollingInterval = null;
        let currentCacheId = null;
        let currentMode = null; // 'mse' | 'fallback' | 'cached'

        let mediaSource = null;
        let sourceBuffer = null;
        let streamReader = null;
        let bytesReceived = 0;
        let streamFinished = false;
        let lastStatus = null;

        const player = document.getElementById('audioPlayer');
        const btn = document.getElementById('convertBtn');
        const progFill = document.getElementById('progFill');
        const progText = document.getElementById('progText');
        const statusLbl = document.getElementById('statusLabel');
        const fileSizeInfo = document.getElementById('fileSizeInfo');
        const playerTitle = document.getElementById('playerTitle');
        const playerBox = document.getElementById('playerContainer');
        const progBox = document.getElementById('progContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const speedSelect = document.getElementById('speedSelect');
        const engineSel = document.getElementById('engine');
        const voiceGroup = document.getElementById('voiceGroup');
        const voiceSel = document.getElementById('voice');

        const MSE_SUPPORTED = (
            typeof MediaSource !== 'undefined' &&
            MediaSource.isTypeSupported('audio/mpeg')
        );
        console.log('[TTS] MediaSource audio/mpeg supported:', MSE_SUPPORTED);

        // ============================================================
        // Helpers
        // ============================================================
        function getRate() {
            return parseFloat(speedSelect.value || '1');
        }

        function formatBytes(bytes) {
            if (!bytes || bytes < 0) return '0 KB';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function updateVoiceVisibility() {
            voiceGroup.style.display = engineSel.value === 'gtts' ? 'none' : '';
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function updateProgress(current, total) {
            const pct = total > 0 ? (current / total) * 100 : 0;
            progFill.style.width = pct + '%';
            progText.textContent = `${current || 0} / ${total || 0} đoạn`;
        }

        function setStatus(text) {
            statusLbl.textContent = text;
        }

        function showBadge(type) {
            const old = playerTitle.querySelector('.badge');
            if (old) old.remove();
            const badge = document.createElement('span');
            badge.className = 'badge badge-' + type;
            badge.textContent = {
                live: '● LIVE',
                done: '✓ Hoàn thành',
                cached: '★ Cache',
                error: '⚠ Lỗi',
                wait: '… Đang chờ'
            }[type] || type;
            playerTitle.appendChild(badge);
        }

        function clearBadge() {
            const old = playerTitle.querySelector('.badge');
            if (old) old.remove();
        }

        function applyPlaybackRate() {
            player.playbackRate = getRate();
        }

        function cleanupMSE() {
            if (streamReader) {
                try { streamReader.cancel(); } catch (_) {}
                streamReader = null;
            }
            if (sourceBuffer && sourceBuffer.updating) {
                // nothing else to do here
            }
            if (mediaSource && mediaSource.readyState === 'open') {
                try { mediaSource.endOfStream(); } catch (_) {}
            }
            if (player.src && player.src.startsWith('blob:')) {
                try { URL.revokeObjectURL(player.src); } catch (_) {}
            }
            mediaSource = null;
            sourceBuffer = null;
        }

        function resetUI() {
            cleanupMSE();
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
            currentCacheId = null;
            currentMode = null;
            bytesReceived = 0;
            streamFinished = false;
            lastStatus = null;

            player.pause();
            player.removeAttribute('src');
            player.load();

            progBox.style.display = 'block';
            playerBox.style.display = 'none';
            progFill.style.width = '0%';
            progText.textContent = '0 / 0 đoạn';
            fileSizeInfo.textContent = '';
            downloadBtn.style.display = 'none';
            downloadBtn.href = '';
            setStatus('Đang gửi yêu cầu...');
            clearBadge();
        }

        function waitSourceBufferIdle(sb) {
            if (!sb || !sb.updating) return Promise.resolve();
            return new Promise(resolve => {
                sb.addEventListener('updateend', resolve, { once: true });
            });
        }

        async function appendChunkToSourceBuffer(sb, chunk) {
            await waitSourceBufferIdle(sb);
            return new Promise((resolve, reject) => {
                const onUpdateEnd = () => {
                    cleanup();
                    resolve();
                };
                const onError = (e) => {
                    cleanup();
                    reject(e);
                };
                const cleanup = () => {
                    sb.removeEventListener('updateend', onUpdateEnd);
                    sb.removeEventListener('error', onError);
                };
                sb.addEventListener('updateend', onUpdateEnd, { once: true });
                sb.addEventListener('error', onError, { once: true });
                try {
                    sb.appendBuffer(chunk);
                } catch (e) {
                    cleanup();
                    reject(e);
                }
            });
        }

        // ============================================================
        // Core flow
        // ============================================================
        engineSel.addEventListener('change', updateVoiceVisibility);
        updateVoiceVisibility();

        speedSelect.addEventListener('change', applyPlaybackRate);
        player.addEventListener('play', applyPlaybackRate);
        player.addEventListener('canplay', applyPlaybackRate);

        btn.onclick = async function () {
            const text = document.getElementById('textInput').value.trim();
            const engine = engineSel.value;
            const voice = voiceSel.value;

            if (!text) {
                alert('Vui lòng nhập văn bản!');
                return;
            }

            resetUI();
            btn.disabled = true;

            const body = { text, engine };
            if (engine === 'edge') body.voice = voice;

            let data;
            try {
                const res = await fetch('/tts/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || 'Không thể bắt đầu tạo audio');
                }
            } catch (e) {
                setStatus('Lỗi kết nối: ' + (e.message || e));
                showBadge('error');
                btn.disabled = false;
                return;
            }

            currentCacheId = data.cache_id;

            if (data.status === 'completed') {
                currentMode = 'cached';
                updateProgress(1, 1);
                setStatus('Đã tìm thấy audio trong cache.');
                showBadge('cached');
                playDirect(currentCacheId);
                showDownloadButton(currentCacheId);
                btn.disabled = false;
                return;
            }

            if (MSE_SUPPORTED) {
                currentMode = 'mse';
                showBadge('live');
                setStatus('Đang tạo audio và phát trực tiếp...');
                startPolling(currentCacheId, { allowDirectPlayWhenCompleted: false });
                startMSEPlayback(currentCacheId);
            } else {
                currentMode = 'fallback';
                showBadge('wait');
                setStatus('Trình duyệt không hỗ trợ phát trực tiếp. Đang tạo audio, sẽ phát khi hoàn thành...');
                startPolling(currentCacheId, { allowDirectPlayWhenCompleted: true });
            }
        };

        // ============================================================
        // Polling status
        // ============================================================
        function startPolling(cacheId, options = {}) {
            const { allowDirectPlayWhenCompleted = false } = options;
            if (pollingInterval) clearInterval(pollingInterval);

            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch('/tts/status/' + cacheId, { cache: 'no-store' });
                    if (!res.ok) throw new Error('Không lấy được trạng thái');
                    const data = await res.json();
                    lastStatus = data;

                    updateProgress(data.progress || 0, data.total || 0);

                    if (data.status === 'processing') {
                        if (currentMode === 'mse') {
                            setStatus(`Đang tạo audio đoạn ${data.progress || 0}/${data.total || 0} và phát trực tiếp...`);
                        } else {
                            setStatus(`Đang tạo audio đoạn ${data.progress || 0}/${data.total || 0}...`);
                        }
                        if (bytesReceived > 0) {
                            fileSizeInfo.textContent = `Đã nhận: ${formatBytes(bytesReceived)}`;
                        }
                        return;
                    }

                    if (data.status === 'failed') {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                        setStatus('Lỗi tạo audio: ' + (data.error || 'unknown'));
                        showBadge('error');
                        btn.disabled = false;
                        return;
                    }

                    if (data.status === 'completed') {
                        const finalSize = data.file_size || 0;
                        updateProgress(data.total || 1, data.total || 1);

                        if (currentMode === 'mse') {
                            if (streamFinished && bytesReceived >= finalSize) {
                                setStatus('Hoàn thành!');
                                showBadge('done');
                                fileSizeInfo.textContent = `Kích thước file: ${formatBytes(finalSize)}`;
                                showDownloadButton(cacheId);
                                clearInterval(pollingInterval);
                                pollingInterval = null;
                                btn.disabled = false;
                            } else {
                                setStatus('Đã tạo xong audio, đang nạp phần cuối để phát...');
                                showBadge('live');
                                fileSizeInfo.textContent = `Đã nhận: ${formatBytes(bytesReceived)} / ${formatBytes(finalSize)}`;
                            }
                        } else {
                            setStatus('Đã tạo xong audio. Đang mở trình phát...');
                            fileSizeInfo.textContent = `Kích thước file: ${formatBytes(finalSize)}`;
                            showBadge('done');
                            showDownloadButton(cacheId);
                            clearInterval(pollingInterval);
                            pollingInterval = null;
                            if (allowDirectPlayWhenCompleted) {
                                playDirect(cacheId);
                            }
                            btn.disabled = false;
                        }
                    }
                } catch (e) {
                    console.error('Polling error:', e);
                }
            }, 1000);
        }

        // ============================================================
        // MediaSource live playback
        // ============================================================
        function startMSEPlayback(cacheId) {
            playerBox.style.display = 'block';
            bytesReceived = 0;
            streamFinished = false;

            mediaSource = new MediaSource();
            player.src = URL.createObjectURL(mediaSource);

            mediaSource.addEventListener('sourceopen', async () => {
                try {
                    if (!mediaSource || mediaSource.readyState !== 'open') return;
                    sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
                    sourceBuffer.mode = 'sequence';
                    await pumpLiveStream(cacheId);
                } catch (e) {
                    console.error('[MSE] sourceopen error:', e);
                    setStatus('Không thể phát trực tiếp. Hệ thống sẽ chờ đến khi audio hoàn thành.');
                    showBadge('wait');
                    cleanupMSE();
                    currentMode = 'fallback';
                    startPolling(cacheId, { allowDirectPlayWhenCompleted: true });
                }
            }, { once: true });
        }

        async function pumpLiveStream(cacheId) {
            let response = null;

            // Stream endpoint có thể chưa sẵn sàng ngay lập tức; thử vài lần
            for (let attempt = 0; attempt < 40; attempt++) {
                try {
                    const res = await fetch('/tts/stream/' + cacheId, { cache: 'no-store' });
                    if (res.ok) {
                        response = res;
                        break;
                    }
                    if (res.status === 503) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.detail || 'Generation failed');
                    }
                } catch (e) {
                    if (attempt === 39) throw e;
                }
                await sleep(300);
            }

            if (!response || !response.body) {
                throw new Error('Không thể mở live stream');
            }

            streamReader = response.body.getReader();
            let firstChunk = true;

            while (true) {
                const { done, value } = await streamReader.read();
                if (done) break;
                if (!value || value.byteLength === 0) continue;

                bytesReceived += value.byteLength;
                fileSizeInfo.textContent = `Đã nhận: ${formatBytes(bytesReceived)}`;

                if (!sourceBuffer || !mediaSource || mediaSource.readyState !== 'open') {
                    break;
                }

                await appendChunkToSourceBuffer(sourceBuffer, value);

                if (firstChunk) {
                    firstChunk = false;
                    playerBox.style.display = 'block';
                    applyPlaybackRate();
                    player.play().catch(() => {});
                }
            }

            streamFinished = true;

            if (sourceBuffer) {
                await waitSourceBufferIdle(sourceBuffer);
            }
            if (mediaSource && mediaSource.readyState === 'open') {
                try { mediaSource.endOfStream(); } catch (_) {}
            }

            // Cập nhật UI sau khi stream xong: chỉ báo done nếu backend completed và đã nhận đủ bytes
            const finalState = lastStatus;
            if (finalState && finalState.status === 'completed') {
                const finalSize = finalState.file_size || 0;
                if (bytesReceived >= finalSize) {
                    setStatus('Hoàn thành!');
                    showBadge('done');
                    fileSizeInfo.textContent = `Kích thước file: ${formatBytes(finalSize)}`;
                    showDownloadButton(cacheId);
                    if (pollingInterval) {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                    }
                } else {
                    setStatus('Đã tạo xong audio, nhưng trình phát vẫn đang nạp phần cuối...');
                    showBadge('live');
                    fileSizeInfo.textContent = `Đã nhận: ${formatBytes(bytesReceived)} / ${formatBytes(finalSize)}`;
                }
            }

            btn.disabled = false;
        }

        // ============================================================
        // Download button
        // ============================================================
        function showDownloadButton(cacheId) {
            const url = '/tts/file/' + cacheId;
            downloadBtn.href = url;
            downloadBtn.download = 'audio_' + cacheId.slice(0, 8) + '.mp3';
            downloadBtn.style.display = 'inline-flex';
        }

        // ============================================================
        // Direct playback for cached/completed audio
        // ============================================================
        function playDirect(cacheId) {
            playerBox.style.display = 'block';
            const url = '/tts/file/' + cacheId + '?t=' + Date.now();
            player.src = url;
            player.addEventListener('canplay', function onCanPlay() {
                player.removeEventListener('canplay', onCanPlay);
                applyPlaybackRate();
                player.play().catch(() => {});
            }, { once: true });
        }
    </script>
</body>
</html>
